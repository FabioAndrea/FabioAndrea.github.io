        /*pengaturan kotak dalam pada bagian linktree*/
        .linktree-container {
            max-width: 580px;

            padding: 40px 20px;

        /*pengaturan pada bagia background menu linktree dan share*/
        .linktr-menu {
            width: 40px;

            border-radius: 50%;
            margin-top: -10px;
            margin-left: 8px;
            background-color: white;
            border: none;
        }

        /* gambar linktree atas*/
        .linktr-menu svg {
            width: 50px;
            margin-left: -10px;
        }

        /*pengaturan background pada menu share*/
        .linktr-share {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin-top: -10px;
            margin-right: 8px;
            background-color: white;
            border: none;

        /*mengatur gambar share*/
        .linktr-share svg {
            width: 20px;
            margin-left: 5px;
        }

        /*pengaturan pada bagian foto profil*/
        .foto-profil img {
            margin-top: 20px;
            width: 96px;
            height: 96px;
            border-radius: 50%;
            margin-bottom: 16px;
        }

        /*style untuk judul linktree*/
        .judul-linktree {
            font-size: 24px;
            font-weight: 400;
            margin-bottom: 16px;
        }

        /*logo instagram*/
        .link-insta {
            margin-bottom: 32px;
        }

        /*pengaturan gambar instagram*/
        .link-insta svg {
            width: 32px;
            height: 32px;
        }

        .link-insta a:hover svg {
            transform: scale(1.1);
        }

        /*pengaturan tombol*/
        .btn-utama {
            position: relative;
            padding: 20px;
            margin-bottom: 14px;
            border: 1px solid lightgrey;
            display: flex;
            justify-content: center;
            width: 100%;
            align-items: center;
            background-color: transparent;
            font-weight: 400;
            font-size: medium;
        }

        .btn-utama:hover {
            background-color: rgba(90, 84, 80, 0.2);
            text-decoration: none;
        }

        /*pengaturan titik 3 di sebelah kanan tombol*/
        .btn-titik {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 24px;
            height: 24px;
            border: none;
            background: transparent;
            border-radius: 8px;
            opacity: 0.5;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-titik:hover {
            background-color: rgba(0, 0, 0, 0.1);
            opacity: 1;
        }

        /*pengaturan tombol join kesatria2026*/
        .join-kesatria-btn {
            font-family: "Inter", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            width: fit-content;
            margin: 80px auto 30px;
            padding: 10px 15px;
            background-color: #ffffff;
            font-weight: bold;
            font-size: medium;
            box-shadow: 0px 4px 8px rgb(185, 179, 179);
            transition: all 0.2s ease-in-out;
        }

        .join-kesatria-btn:hover {
            text-decoration: none
        }

        /*pengaturan pada bagian footer*/
        .footer {
            font-size: 12px;
            font-family: 'Inter', sans-serif;
        }

        .footer a {
            color: black;
        }
